<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Travel Buddy</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

  <!-- ====== HEADER ====== -->
  <header class="header">
    <div class="header-inner">
      <h1>✈ Travel Buddy</h1>
      <p>Post your trip or find a travel match</p>
    </div>
  </header>

  <main class="container">

    <!-- ============================== -->
    <!--  LEFT COLUMN — POST + SEARCH   -->
    <!-- ============================== -->
    <aside class="sidebar">

      <!-- ---- Create Post Form ---- -->
      <section class="card" id="post-section">
        <h2>Post a Trip</h2>

        <form id="post-form" autocomplete="off">
          <label for="post-from">From</label>
          <input
            type="text"
            id="post-from"
            name="from"
            placeholder="e.g. New York"
            required
          />

          <label for="post-to">To</label>
          <input
            type="text"
            id="post-to"
            name="to"
            placeholder="e.g. Los Angeles"
            required
          />

          <label for="post-date">Travel Date</label>
          <input
            type="date"
            id="post-date"
            name="date"
            required
          />

          <label for="post-note">Note <span class="optional">(optional)</span></label>
          <textarea
            id="post-note"
            name="note"
            rows="3"
            placeholder="e.g. Looking for a carpool buddy!"
          ></textarea>

          <button type="submit" class="btn btn-primary">Post Trip</button>
        </form>

        <!-- Feedback message shown after posting -->
        <div id="post-message" class="message" hidden></div>
      </section>

      <!-- ---- Search / Filter Form ---- -->
      <section class="card" id="search-section">
        <h2>Find a Trip</h2>

        <form id="search-form" autocomplete="off">
          <label for="search-from">From</label>
          <input
            type="text"
            id="search-from"
            name="from"
            placeholder="e.g. New York"
          />

          <label for="search-to">To</label>
          <input
            type="text"
            id="search-to"
            name="to"
            placeholder="e.g. Los Angeles"
          />

          <label for="search-date">Travel Date <span class="optional">(optional)</span></label>
          <input
            type="date"
            id="search-date"
            name="date"
          />

          <div class="btn-row">
            <button type="submit" class="btn btn-accent">Search</button>
            <button type="button" id="clear-btn" class="btn btn-ghost">Show All</button>
          </div>
        </form>
      </section>
    </aside>

    <!-- ============================== -->
    <!--  RIGHT COLUMN — TRIP LIST      -->
    <!-- ============================== -->
    <section class="content" id="results-section">
      <div class="results-header">
        <h2>Trips</h2>
        <span id="results-count" class="badge">0</span>
      </div>

      <!-- Posts are injected here by JavaScript -->
      <div id="results-list">
        <p class="placeholder-text">Loading trips…</p>
      </div>
    </section>

  </main>

  <!-- ====== FOOTER ====== -->
  <footer class="footer">
    <p>Travel Buddy &mdash; a simple trip-sharing board</p>
  </footer>

  <!-- Frontend logic -->
  <script src="/js/app.js"></script>
</body>
</html>
